<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scrum Tracker</title>
    <script>
      // Restore path redirected by 404.html
      (function() {
        var p = window.location.search.match(/[?&]p=([^&]*)/);
        if (p) {
          var path = decodeURIComponent(p[1].replace(/~and~/g, '&'));
          var q = window.location.search.match(/[?&]q=([^&]*)/);
          var query = q ? '?' + decodeURIComponent(q[1].replace(/~and~/g, '&')) : '';
          window.history.replaceState(null, null, window.location.pathname.split('/').slice(0, 2).join('/') + '/' + path + query + window.location.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
